<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      position: relative; /* IMPORTANT */
      width: 400px;
      height: 200px;
      border: 2px solid black;
    }

    .box {
      width: 100px;
      height: 100px;
    }

    .red {
      background: red;
    }

    .blue {
      background: blue;
    }

    .green {
      background: green;
      position: relative;
      top: 20px;
      right: 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="box red"></div>
    <div class="box blue"></div>
    <div class="box green"></div>
  </div>

</body>
</html>
